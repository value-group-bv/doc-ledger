name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes for this version
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION:-${{ github.event.inputs.tag }}}
          VERSION=${VERSION#v}
          NOTES=$(awk "/^## Version $VERSION/,/^## Version /{if(/^## Version $VERSION/)next; if(/^## Version /)exit; print}" RELEASENOTES.MD)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
