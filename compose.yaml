services:

  php:
    image: ghcr.io/value-group-bv/doc-ledger/app:latest
    env_file: .env
    volumes:
      - docledger_var:/var/www/html/var
    restart: unless-stopped

  web:
    image: ghcr.io/value-group-bv/doc-ledger/web:latest
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - php
    networks:
      - default
      - npm_network
    restart: unless-stopped

volumes:
  docledger_var:

networks:
  npm_network:
    external: true
