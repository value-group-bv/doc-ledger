services:

  php:
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET}"
      DATABASE_URL: "sqlite:////var/www/html/var/data.db"
      MESSENGER_TRANSPORT_DSN: "sync://"
      TRUSTED_PROXIES: "127.0.0.1,PRIVATE_SUBNETS"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
    volumes:
      - docledger_var:/var/www/html/var
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - php
    networks:
      - default
      - npm_network
    restart: unless-stopped

volumes:
  docledger_var:

networks:
  npm_network:
    external: true
